# Step 1 Conversation Agent — Test Scenarios
#
# Category A: Single-turn info completeness (does the LLM act or ask?)
# Category B: Multi-turn conversations (does the LLM converge efficiently?)
#
# For multi-turn scenarios (B), assistant messages with content: null
# are generated by the LLM during the test. The script feeds user
# messages sequentially, letting the LLM respond between each.

# ──────────────────────────────────────────────
# Category A: Single-Turn Info Completeness
# ──────────────────────────────────────────────

- id: A1_injury_vague
  constraint: injury
  messages:
    - role: user
      content: "Something hurts"
  expected_status: need_info
  expected_follow_up_targets: [body_location, which_sports_painful]
  notes: "Extremely vague — must ask for body part AND sport impact"

- id: A2_injury_almost_complete
  constraint: injury
  messages:
    - role: user
      content: "My knee has been hurting since Tuesday, I can't run but biking is fine"
  expected_status: need_info
  expected_follow_up_targets: [which_sports_painful]
  notes: "Has body part + one sport, but swim status unknown. Should ask about swim, NOT about duration."

- id: A3_illness_must_ask_fever
  constraint: illness
  messages:
    - role: user
      content: "I've got a cold, runny nose and sneezing"
  expected_status: need_info
  expected_follow_up_targets: [fever]
  notes: "Must ask about fever — it's a required field for illness and not mentioned"

- id: A4_illness_complete
  constraint: illness
  messages:
    - role: user
      content: "I've had a fever of 38.5 since yesterday with body aches and chest congestion"
  expected_status: ready
  expected_constraint_summary:
    type: illness
  notes: "Below neck + fever — has all required fields. Must act immediately."

- id: A5_equipment_travel
  constraint: equipment
  messages:
    - role: user
      content: "I'm traveling to London March 3-10. Hotel has a gym with treadmill and spin bike but no pool."
  expected_status: ready
  expected_constraint_summary:
    type: equipment
    affected_sports: [swim]
    available_sports: [run, bike]
  notes: "Travel is the cause, no pool is the constraint. Should classify as equipment."

- id: A6_not_a_disruption
  messages:
    - role: user
      content: "Thanks for adjusting my plan last week, it felt great!"
  expected_status: no_action
  notes: "Should respond conversationally, NOT classify as constraint"

# ──────────────────────────────────────────────
# Category B: Multi-Turn Conversations
# ──────────────────────────────────────────────

- id: B1_injury_converge
  constraint: injury
  messages:
    - role: user
      content: "I hurt myself"
    - role: assistant
      content: null
    - role: user
      content: "It's my shoulder"
    - role: assistant
      content: null
    - role: user
      content: "I can bike and run fine but swimming is painful"
  expected_final_status: ready
  expected_constraint_summary:
    type: injury
    affected_sports: [swim]
    available_sports: [bike, run]
  notes: "Must converge naturally — no hard cap, but should resolve efficiently"

- id: B2_fatigue_one_turn
  constraint: fatigue
  messages:
    - role: user
      content: "I'm feeling really tired"
    - role: assistant
      content: null
    - role: user
      content: "All week, my legs feel like lead and I'm sleeping badly"
  expected_final_status: ready
  expected_constraint_summary:
    type: fatigue
    severity: moderate
  notes: "Severity now clear (all week = moderate). Should act."

- id: B3_illness_fever_gate
  constraint: illness
  messages:
    - role: user
      content: "I've got a cold"
    - role: assistant
      content: null
    - role: user
      content: "No fever, just runny nose and sneezing"
  expected_final_status: ready
  expected_constraint_summary:
    type: illness
    severity: mild
  notes: "Above-neck, no fever. Key test: does the LLM naturally ask about fever from the required fields?"

- id: B4_escalation
  constraint: injury
  messages:
    - role: user
      content: "I broke my leg and I'll be in a cast for 8 weeks"
  expected_final_status: escalate
  notes: "8 weeks = beyond modification scope. Should recommend plan regen."
