# Dromos Training Plan Eval — Step 3: Workout Selection (Block-based)
# Generation: node run-step3-blocks.js (sequential block processing via OpenAI)
# Validation: npx promptfoo eval -c promptfooconfig.step3.yaml
# View:       npx promptfoo view

# Load API keys from project root .env
commandLineOptions:
  envPath: ../../.env

description: "Step 3 — Workout template selection (block-based, pre-computed)"

prompts:
  - "Validate pre-computed Step 3 output"

# Use pre-computed provider (returns outputs from run-step3-blocks.js)
providers:
  - file://providers/step3-precomputed.js

# Test cases generated by run-step3-blocks.js
tests: file://vars/step3-inputs.yaml

defaultTest:
  vars:
    workout_library: file://../context/workout-library.json
  assert:
    # Must be valid JSON
    - type: javascript
      value: |
        try {
          const s = output.replace(/```json\n?/g, '').replace(/```\n?/g, '').trim();
          JSON.parse(s);
          return { pass: true, score: 1, reason: 'Valid JSON' };
        } catch (e) {
          return { pass: false, score: 0, reason: 'Invalid JSON: ' + e.message };
        }
    # Validate template IDs, sport/type matching, variety, bricks, rest days
    - type: javascript
      value: file://assertions/validate-workout-selection.js
    # LLM-graded: does the selection make coaching sense?
    - type: llm-rubric
      value: |
        Evaluate this workout selection for a triathlon training plan.
        Athlete: {{athlete_name}}. Limiters: {{limiters}}. Constraints: {{constraints}}.

        The macro plan JSON was:
        {{macro_plan_json}}

        IMPORTANT context for type mapping:
        - "Race-pace" in the macro plan should be mapped to Tempo templates — this is correct.
        - "Brick" as a session type in the macro plan should become Easy or Tempo with is_brick=true.

        Score 1 (pass) if ALL are true:
        - Every session from the macro plan has a template_id assigned
        - Template IDs match the correct sport (SWIM_*/BIKE_*/RUN_*)
        - Template type matches the output type field
        - There is reasonable variety in template selection (not the same workout every week)
        - Sessions are spread across the week with rest days respected
        - Brick sessions (if any) are correctly paired: bike+run on same day
        - Phase-appropriate difficulty: simpler workouts in Base, harder in Build/Peak
        - Constraints are respected (e.g. no back-to-back hard run days for knee issues)
        Score 0 (fail) if template IDs don't match sports, output type doesn't match template_id type, or if critical constraints are violated.
